<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify</title>
  <link rel="icon" type="image/png" href="https://open.spotifycdn.com/cdn/images/favicon32.b64ecc03.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="14" fill="#1DB954"/>
            <path d="M7 10.5c3.5-1.4 7.5-1.4 11 0M8.5 13.5c2.5-1 6.5-1 9 0M10 16.5c1.5-.6 4.5-.6 6 0" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span>Spotify</span>
        </div>

        <nav class="nav">
          <a href="#" class="nav-item active" data-view="home">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Home
          </a>
          <a href="#" class="nav-item" data-view="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            Search
          </a>
          <a href="#" class="nav-item" data-view="queue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Queue
          </a>
        </nav>
      </div>

      <div class="sidebar-bottom">
        <a href="https://github.com/" target="_blank" rel="noopener" class="github-link">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          <span>The Android</span>
        </a>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="search-bar" id="searchBar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search for songs, artists..." autocomplete="off" />
          <button class="clear-btn" id="clearBtn" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="view active" id="view-home">
        <section class="section">
          <h2>Trending Genres</h2>
          <div class="genres">
            <button class="genre-pill active" data-genre="pop">Pop</button>
            <button class="genre-pill" data-genre="rock">Rock</button>
            <button class="genre-pill" data-genre="hip hop">Hip Hop</button>
            <button class="genre-pill" data-genre="jazz">Jazz</button>
            <button class="genre-pill" data-genre="electronic">Electronic</button>
            <button class="genre-pill" data-genre="classical">Classical</button>
            <button class="genre-pill" data-genre="r&b">R&B</button>
            <button class="genre-pill" data-genre="indie">Indie</button>
          </div>
        </section>

        <section class="section">
          <h2 id="tracksHeading">Popular Tracks</h2>
          <div class="tracks-grid" id="tracksGrid">
            <div class="track-skeleton" aria-hidden="true"></div>
            <div class="track-skeleton" aria-hidden="true"></div>
            <div class="track-skeleton" aria-hidden="true"></div>
            <div class="track-skeleton" aria-hidden="true"></div>
            <div class="track-skeleton" aria-hidden="true"></div>
            <div class="track-skeleton" aria-hidden="true"></div>
          </div>
        </section>
      </div>

      <div class="view" id="view-search">
        <section class="section">
          <h2 id="searchHeading">Search Results</h2>
          <div class="tracks-grid" id="searchGrid">
            <p class="empty-state">Type something to search</p>
          </div>
        </section>
      </div>

      <div class="view" id="view-queue">
        <section class="section">
          <div class="queue-header">
            <h2>Queue</h2>
            <button class="clear-queue-btn" id="clearQueue">Clear all</button>
          </div>
          <div class="queue-list" id="queueList">
            <p class="empty-state">Your queue is empty. Add tracks to get started.</p>
          </div>
        </section>
      </div>
    </main>

    <div class="player" id="player">
      <div class="player-left">
        <div class="player-art" id="playerArt">
          <div class="art-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19V6l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
        </div>
        <div class="player-info">
          <span class="player-track" id="playerTrack">Nothing playing</span>
          <span class="player-artist" id="playerArtist">--</span>
        </div>
        <button class="icon-btn add-queue-btn" id="addToQueueBtn" title="Add to queue" style="opacity:0.4">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <div class="player-center">
        <div class="controls">
          <button class="icon-btn" id="shuffleBtn" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
          </button>
          <button class="icon-btn" id="prevBtn" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="play-btn" id="playBtn" title="Play/Pause">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="icon-btn" id="nextBtn" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="icon-btn" id="repeatBtn" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          </button>
        </div>
        <div class="progress-area">
          <span class="time" id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
          <span class="time" id="totalTime">0:30</span>
        </div>
      </div>

      <div class="player-right">
        <button class="icon-btn" id="muteBtn" title="Mute">
          <svg id="volIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
          <svg id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
        <div class="volume-bar" id="volumeBar">
          <div class="volume-fill" id="volumeFill" style="width:70%"></div>
        </div>
        <span class="preview-badge">30s Preview</span>
      </div>
    </div>

  </div>

  <audio id="audioEl"></audio>

  <script src="app.js"></script>
</body>
</html>
